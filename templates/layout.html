<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title | default(value="niwatoriiiiiiiii | Portfolio") }}</title>
    <!-- Favicon -->
    <link rel="icon" href="{{ base_url }}assets/icons/favicon.ico">
    <!-- Styles -->
    <link rel="stylesheet" href="{{ base_url }}assets/css/style.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Outfit:wght@300;600&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="breadcrumbs">
                <a href="{{ base_url }}" class="breadcrumb-item">にわとりのいえ</a>
                {% if page_title %}
                <span class="breadcrumb-item">></span>
                <span class="breadcrumb-item">Blog</span>
                <span class="breadcrumb-item">></span>
                <span class="breadcrumb-item">{{ page_title }}</span>
                {% endif %}
            </nav>
        </div>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 niwatoriiiiiiiii. All rights reserved.</p>
        </div>
    </footer>
    <!-- KaTeX Script -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            renderMathInElement(document.body, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ],
                throwOnError : false
            });

            // 外部リンクを別タブで開く
            const links = document.querySelectorAll('a[href^="http"]');
            links.forEach(link => {
                if (!link.href.includes(window.location.host)) {
                    link.setAttribute('target', '_blank');
                    link.setAttribute('rel', 'noopener noreferrer');
                }
            });
        });
    </script>
</body>
</html>
